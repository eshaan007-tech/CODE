<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ALZ-Detection | Prediction Chart</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    body {
      background-color: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    nav {
      background-color: #003d66;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 3px 6px rgba(0,0,0,0.1);
    }
    nav .logo {
      color: white;
      font-weight: 700;
      font-size: 1.6rem;
      text-decoration: none;
      letter-spacing: 1.1px;
      user-select: none;
    }
    nav .nav-links a {
      color: #b3cde0;
      font-weight: 600;
      text-decoration: none;
      margin-left: 2rem;
      font-size: 0.95rem;
      cursor: pointer;
      transition: color 0.3s ease;
    }
    nav .nav-links a:hover {
      color: #ffffff;
    }
    main {
      flex-grow: 1;
      max-width: 720px;
      margin: 3rem auto;
      padding: 1rem;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 14px 30px rgba(0, 61, 102, 0.15);
      text-align: center;
    }
    main h2 {
      color: #003d66;
      font-weight: 700;
      font-size: 2.4rem;
      margin-bottom: 2rem;
      user-select: none;
    }
    canvas {
      max-width: 100%;
      border-radius: 12px;
    }
  </style>
</head>
<body>

<nav>
  <a href="/index" class="logo">ALZ-Detection</a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/index">Predict</a>
    <a href="/performance">Performance</a>
    <a href="/logout">Logout</a>
  </div>
</nav>

<main>
  <h2>Prediction Distribution Chart</h2>
  <canvas id="predictionChart" width="600" height="400"></canvas>
</main>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const labels = ['MildDemented', 'ModerateDemented', 'NonDemented', 'VeryMildDemented'];
    const values = [20, 10, 50, 20];

    const ctx = document.getElementById('predictionChart').getContext('2d');

    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: 'Number of Predictions',
          data: values,
          backgroundColor: ['#0059b3', '#007acc', '#3399ff', '#80b3ff'],
          borderRadius: 6,
          borderWidth: 1
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: {
            labels: { font: { size: 14 } }
          },
          tooltip: {
            enabled: true,
            callbacks: {
              label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y}`
            }
          }
        },
        scales: {
          y: {
            beginAtZero: true,
            ticks: { font: { size: 13 } }
          },
          x: {
            ticks: { font: { size: 13 } }
          }
        }
      }
    });
  });
</script>

</body>
</html>
